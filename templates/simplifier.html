{% extends "base.html" %}
{% block header %}Magic Simplifier{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto space-y-8 mt-4">
    <div class="glass-card p-10 rounded-[3rem] border-t-8 border-[var(--primary)] shadow-2xl relative overflow-hidden transition-all duration-500">
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-[var(--primary)] opacity-10 blur-[80px] rounded-full"></div>
        
        <textarea id="complexInput" 
            class="w-full h-48 bg-[var(--bg)] border-2 border-[var(--border)] rounded-[2rem] p-8 text-[var(--text)] text-lg focus:outline-none focus:border-[var(--primary)] transition-all placeholder:text-[var(--muted)]" 
            placeholder="Paste complex text here or upload an image to extract text..."></textarea>
        
        <div class="flex flex-col md:flex-row items-center gap-6 mt-6 bg-[var(--primary-soft)] p-6 rounded-[2rem] border border-[var(--primary)]/10">
            <button onclick="document.getElementById('imageUpload').click()" 
                    class="bg-[var(--primary)] text-white px-8 py-3 rounded-2xl font-black transition-all shadow-lg hover:scale-105 active:scale-95 flex items-center gap-3">
                <i class="fa-solid fa-camera-retro"></i> 
                <span>AI OCR Extract</span>
            </button>
            <input type="file" id="imageUpload" accept="image/*" hidden onchange="processImageMock()">
            <span id="imageStatus" class="text-sm text-[var(--muted)] font-bold tracking-tight">
                <i class="fa-solid fa-wand-sparkles mr-1"></i> Upload a photo to extract text using AI
            </span>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
            <select id="langSelect" class="bg-[var(--surface)] border-2 border-[var(--border)] rounded-2xl px-6 py-4 text-[var(--text)] focus:outline-none focus:border-[var(--primary)] font-bold appearance-none cursor-pointer">
                <option value="Simple English">Simple English</option>
                <option value="Hindi">Hindi (हिन्दी)</option>
            </select>

            <button onclick="startMagic()" id="magicBtn" 
                class="bg-gradient-to-r from-[var(--primary)] to-[var(--accent)] py-4 rounded-2xl font-black text-xl text-white transition-all transform hover:scale-[1.02] active:scale-95 shadow-xl shadow-[var(--primary)]/20">
                ✨ RUN MAGIC SIMPLIFIER
            </button>
        </div>
    </div>

    <div id="outputContainer" class="hidden space-y-8 animate-in fade-in slide-in-from-bottom-8 duration-700">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-2 glass-card p-10 rounded-[3rem] border-l-8 border-[var(--primary)] relative overflow-hidden">
                <div class="absolute -left-10 -top-10 w-40 h-40 bg-[var(--primary)] opacity-5 blur-[60px] rounded-full"></div>
                <h4 class="text-xs font-black text-[var(--primary)] uppercase mb-6 tracking-[0.2em] flex items-center gap-2">
                    <i class="fa-solid fa-bolt-lightning"></i> Simple Explanation
                </h4>
                <p id="simpleText" class="text-2xl leading-relaxed font-semibold text-[var(--text)]"></p>
            </div>

            <div class="glass-card p-10 rounded-[3rem] border-l-8 border-[var(--accent)] flex flex-col justify-center items-center text-center relative overflow-hidden">
                <div class="absolute -right-10 -bottom-10 w-32 h-32 bg-[var(--accent)] opacity-10 blur-[50px] rounded-full"></div>
                <h4 class="text-xs font-black text-[var(--accent)] uppercase mb-6 tracking-[0.2em] flex items-center gap-2">
                    <i class="fa-solid fa-ear-listen"></i> Voice Reader
                </h4>
                <p class="text-xs text-[var(--muted)] mb-6 font-bold uppercase tracking-tighter">Listen with SunoPadho AI</p>
                <button onclick="readSimplifiedText()" 
                        class="w-20 h-20 rounded-full bg-[var(--accent-soft)] border-4 border-[var(--accent)] text-[var(--accent)] flex items-center justify-center text-3xl hover:scale-110 hover:bg-[var(--accent)] hover:text-white transition-all shadow-xl shadow-[var(--accent)]/10">
                    <i class="fa-solid fa-volume-high"></i>
                </button>
            </div>

            <div class="lg:col-span-3 glass-card p-10 rounded-[3rem] border-b-8 border-[var(--primary)]">
                <h4 class="text-xs font-black text-[var(--primary)] uppercase mb-6 tracking-[0.2em] flex items-center gap-2">
                    <i class="fa-solid fa-clapperboard"></i> Visual Lesson
                </h4>
                <div class="rounded-[2rem] overflow-hidden border-4 border-[var(--border)] shadow-2xl bg-black">
                    <video id="videoPlayer" controls class="w-full aspect-video"></video>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function processImageMock() {
    const fileArea = document.getElementById('imageUpload');
    if(fileArea.files.length > 0) {
        document.getElementById('imageStatus').innerHTML = "<i class='fa-solid fa-circle-notch fa-spin text-[var(--primary)]'></i> AI Vision is extracting text...";
        if(typeof speak === 'function') speak("Suno-Padho Vision is processing the image.");
        
        setTimeout(() => {
            document.getElementById('imageStatus').innerHTML = "<i class='fa-solid fa-circle-check text-[var(--accent)]'></i> Text extracted successfully!";
            document.getElementById('complexInput').value = "Photosynthesis is the process used by plants to convert light energy into chemical energy to fuel the organism's activities.";
            if(typeof speak === 'function') speak("Extraction complete. Text is ready to simplify.");
        }, 2500);
    }
}

async function startMagic() {
    const text = document.getElementById('complexInput').value;
    if(!text) {
        speak("Please provide some text to simplify.");
        return;
    }

    const language = document.getElementById('langSelect').value;
    const btn = document.getElementById('magicBtn');
    btn.innerHTML = "<i class='fa-solid fa-wand-sparkles animate-pulse'></i> CASTING MAGIC...";
    
    if(typeof speak === 'function') speak("Simplifying now.");

    try {
        const res = await fetch('/run-magic', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ text: text, language: language })
        });
        
        const data = await res.json();
        if (!data.success) throw new Error(data.error);

        document.getElementById('simpleText').innerText = data.simple_text;
        
        if(data.video_url) {
            document.getElementById('videoPlayer').src = data.video_url;
        }

        const container = document.getElementById('outputContainer');
        container.classList.remove('hidden');
        container.scrollIntoView({ behavior: 'smooth' });

        btn.innerHTML = "✨ RUN MAGIC SIMPLIFIER";
        if(typeof speak === 'function') speak("Magic complete. " + data.simple_text);

    } catch(e) {
        console.error(e);
        speak("I encountered an error. Please try again.");
        btn.innerHTML = "✨ RUN MAGIC SIMPLIFIER";
    }
}

function readSimplifiedText() {
    const text = document.getElementById('simpleText').innerText;
    if (text && typeof speak === 'function') {
        speak(text);
    }
}
</script>
{% endblock %}
