{% extends "base.html" %}
{% block header %}Magic Simplifier{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto space-y-8">
    <div class="glass-card p-8 rounded-[2.5rem] border-t-4 border-blue-500 shadow-2xl">
        <textarea id="complexInput" class="w-full h-40 bg-white/5 border border-white/10 rounded-3xl p-6 text-white text-lg focus:outline-none focus:ring-2 focus:ring-blue-500" 
                  placeholder="Paste complex text here..."></textarea>
        <button onclick="startMagic()" id="magicBtn" class="active-nav w-full py-4 rounded-2xl font-black text-xl mt-6 transition transform active:scale-95">
            ✨ RUN MAGIC SIMPLIFIER
        </button>
    </div>

    <div id="outputContainer" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-6 transition-all">
        <div class="lg:col-span-2 glass-card p-8 rounded-[2rem] border-l-4 border-blue-500">
            <h4 class="text-xs font-bold text-blue-400 uppercase mb-4">Simple Explanation</h4>
            <p id="simpleText" class="text-xl leading-relaxed"></p>
        </div>

        <div class="glass-card p-8 rounded-[2rem] border-l-4 border-green-500 flex flex-col justify-between items-center text-center">
    <h4 class="text-xs font-bold text-green-400 uppercase mb-4">Voice Reader</h4>
    <div class="space-y-4">
        <p class="text-sm text-gray-500">Click to hear the simplified version via Soon-oh Pud-ho AI.</p>
        <button onclick="readSimplifiedText()" 
                class="w-16 h-16 rounded-full bg-green-500/20 border border-green-500/50 flex items-center justify-center text-2xl hover:scale-110 transition-all">
            🔊
        </button>
    </div>
</div>


        <div class="lg:col-span-3 glass-card p-8 rounded-[2rem] border-l-4 border-purple-500">
            <h4 class="text-xs font-bold text-purple-400 uppercase mb-4">Visual Lesson</h4>
            <video id="videoPlayer" controls class="w-full rounded-2xl border border-white/10"></video>
        </div>
    </div>
</div>

<script>
async function startMagic() {
    const text = document.getElementById('complexInput').value;
    if(!text) return speak("Please enter some text.");

    const btn = document.getElementById('magicBtn');
    btn.innerText = "🧙‍♂️ SIMPLIFYING...";
    
    // Using your CC voice to announce progress
    speak("Soon-oh Pud-ho is simplifying this for you.");

    try {
        const res = await fetch('/run-magic', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ text: text })
        });
        
        const data = await res.json();

        if (!data.success) throw new Error(data.error);

        // Update UI
        document.getElementById('simpleText').innerText = data.simple_text;
        
        // Update Video if it exists
        if(data.video_url) {
            document.getElementById('videoPlayer').src = data.video_url;
        }

        document.getElementById('outputContainer').classList.remove('hidden');
        btn.innerText = "✨ RUN MAGIC SIMPLIFIER";
        
        // Automatically read the result using your CC Voice!
        speak("Magic complete. Here is the simple version: " + data.simple_text);

    } catch(e) {
        console.error(e);
        speak("I encountered an error. Please check your internet or try shorter text.");
        btn.innerText = "✨ RUN MAGIC SIMPLIFIER";
    }
}
</script>
{% endblock %}
