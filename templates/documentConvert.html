<!DOCTYPE html>
<html>
<head>
    <title>File Converter</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            text-align: center;
            padding: 50px;
        }

        .box {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            margin: auto;
        }

        input, select, button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            border-radius: 10px;
            border: none;
        }

        button {
            background: linear-gradient(to right, #3b82f6, #8b5cf6);
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>🔄 File Converter</h2>

    <form action="/convert" method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required>

        <select name="format">
            <option value="pdf">Convert to PDF</option>
            <option value="pptx">Convert to PPT</option>
            <option value="xlsx">Convert to Excel</option>
            <option value="csv">Convert to CSV</option>
        </select>

        <button type="submit">Convert</button>
    </form>
</div>

</body>
</html>
