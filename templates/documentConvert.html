{% extends "base.html" %}
{% block title %}File Converter | SunoPadho{% endblock %}
{% block header %}File Converter{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">

    <div class="glass-card rounded-[2rem] p-8 border-l-4 border-blue-500">
        <h3 class="text-xl font-bold mb-6">🔄 File Converter</h3>

        <form action="/convert" method="POST" enctype="multipart/form-data" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="border-2 border-dashed border-white/10 rounded-2xl p-8 text-center cursor-pointer hover:border-blue-500/50 transition"
                 onclick="this.querySelector('input').click()">
                <div class="text-4xl mb-3">📁</div>
                <p class="text-gray-400">Click to select file</p>
                <input type="file" name="file" required class="hidden" onchange="this.parentElement.querySelector('p').innerText='Selected: '+this.files[0].name">
            </div>

            <select name="format" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white">
                <option value="pdf" class="bg-gray-900">Convert to PDF</option>
                <option value="pptx" class="bg-gray-900">Convert to PPT</option>
                <option value="xlsx" class="bg-gray-900">Convert to Excel</option>
                <option value="csv" class="bg-gray-900">Convert to CSV</option>
            </select>

            <button type="submit" class="active-nav w-full py-4 rounded-2xl font-bold text-xl transition transform active:scale-95">
                Convert
            </button>
        </form>

        <p class="text-xs text-gray-500 mt-4 text-center">Note: File conversion requires CloudConvert API configuration.</p>
    </div>

</div>
{% endblock %}
