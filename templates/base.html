<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}AI Learn{% endblock %}</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
/* 🌈 THEMES */
body.light {
    background: #f3f4f6;
    color: #111827;
}
body.dark {
    background: #0f172a;
    color: #e5e7eb;
}
body.colorblind {
    background: #000000;
    color: #ffffff;
}

/* Sidebar */
.sidebar {
    width: 70px;
    transition: 0.3s;
}

/* Active icon */
.active-icon {
    background: linear-gradient(to bottom, #3b82f6, #8b5cf6);
}
</style>

</head>

<body class="dark flex">

<!-- 🔥 Sidebar (like your image) -->
<div class="sidebar h-screen bg-[#020617] flex flex-col items-center py-4 space-y-6">

    <div class="text-xl text-white font-bold">⚡</div>

    <a href="{{ url_for('dashboard') }}" class="p-3 rounded-lg hover:bg-gray-700">🏠</a>
    <a href="{{ url_for('chatbot') }}" class="p-3 rounded-lg hover:bg-gray-700 active-icon">🤖</a>
    <a href="{{ url_for('activity') }}" class="p-3 rounded-lg hover:bg-gray-700">📊</a>
    <a href="{{ url_for('image') }}" class="p-3 rounded-lg hover:bg-gray-700">🖼️</a>
    <a href="{{ url_for('pdf') }}" class="p-3 rounded-lg hover:bg-gray-700">📄</a>
    <a href="{{ url_for('convert') }}" class="p-3 rounded-lg hover:bg-gray-700">🔄</a>

    <div class="mt-auto mb-4 space-y-4">
        <a href="#" class="p-3 rounded-lg hover:bg-gray-700">♿</a>
        <a href="#" class="p-3 rounded-lg hover:bg-gray-700">⚙️</a>
    </div>
</div>

<!-- 🔥 Main Content -->
<div class="flex-1">

    <!-- 🔹 Top Navbar -->
    <div class="flex justify-between items-center px-6 py-4 border-b border-gray-700">

        <!-- Title -->
        <h1 class="text-xl font-semibold">
            {% block header %}Content Converter{% endblock %}
        </h1>

        <!-- Right Controls -->
        <div class="flex items-center gap-4">

            <!-- Menu Text (instead of buttons like you said) -->
            <!-- <div class="hidden md:flex gap-4 text-sm">
                <a href="{{ url_for('chatbot') }}">Chatbot AI</a>
                <a href="{{ url_for('activity') }}">Recent Activity</a>
                <a href="{{ url_for('image') }}">Img Visualize</a>
                <a href="{{ url_for('pdf') }}">PDF Summarize</a>
                <a href="{{ url_for('convert') }}">Document Conversion</a>
            </div> -->

            <!-- Theme Selector -->
            <select id="themeSelector" class="px-2 py-1 rounded bg-gray-800 text-white">
                <option value="dark">🌙 Dark</option>
                <option value="light">🌞 Light</option>
                <option value="colorblind">♿ Color Blind</option>
            </select>

        </div>
    </div>

    <!-- 🔹 Page Content -->
    <div class="p-6">
        {% block content %}{% endblock %}
    </div>

</div>

<!-- 🔥 Theme Script (Global) -->
<script>
const selector = document.getElementById("themeSelector");

// Load saved theme
const savedTheme = localStorage.getItem("theme") || "dark";
document.body.className = savedTheme + " flex";

// Apply selected theme
selector.value = savedTheme;

selector.addEventListener("change", function () {
    document.body.className = this.value + " flex";
    localStorage.setItem("theme", this.value);
});
</script>

</body>
</html>
