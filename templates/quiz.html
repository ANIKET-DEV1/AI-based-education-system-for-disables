{% extends "base.html" %}
{% block title %}Quiz - SunoPadho AI{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto space-y-8">

    <div class="p-8 glass-card text-center space-y-6">
        <h2 class="text-2xl font-bold">Generate Quiz from Document</h2>
        <p class="text-sm text-[var(--muted)]">Paste text or upload a text file then choose a difficulty and generate 5-8 questions automatically.</p>

        <textarea id="textInput" rows="6" class="w-full p-3 border rounded-lg text-[var(--text)] bg-[var(--surface)] border-[var(--border)]" placeholder="Paste your document text here..."></textarea>

        <label class="block text-left text-[var(--text)] font-medium">Upload document (optional):</label>
        <input type="file" id="fileInput" accept=".txt,.pdf" class="w-full mb-4" />

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <select id="difficultySelect" class="w-full p-3 border rounded-lg text-[var(--text)] bg-[var(--surface)] border-[var(--border)]">
                <option value="simple">Simple</option>
                <option value="medium">Medium</option>
                <option value="difficult">Difficult</option>
            </select>

            <select id="numSelect" class="w-full p-3 border rounded-lg text-[var(--text)] bg-[var(--surface)] border-[var(--border)]">
                <option value="5">5 questions</option>
                <option value="6">6 questions</option>
                <option value="7">7 questions</option>
                <option value="8">8 questions</option>
            </select>

            <button id="startBtn" class="w-full px-6 py-3 bg-[var(--primary)] text-white rounded-xl font-bold hover:opacity-90 transition">Generate Quiz</button>
        </div>

        <div id="quizStatus" class="text-sm text-[var(--muted)]"></div>
    </div>

    <div class="quiz hidden glass-card p-8 space-y-6">
        <div class="question text-lg font-semibold"></div>
        <p id="feedback" class="text-sm font-semibold text-[var(--muted)]"></p>
        <div class="options flex flex-col gap-3"></div>
        <button id="nextBtn" class="hidden px-6 py-2 bg-[var(--primary)] text-white rounded-lg font-bold">Next Question</button>
    </div>

    <div class="result hidden glass-card p-8 space-y-6 text-center">
        <p class="score text-xl font-bold"></p>
        <button id="restartBtn" class="px-6 py-3 bg-[var(--primary)] text-white rounded-xl font-bold hover:opacity-90 transition">Restart Quiz</button>
    </div>

</div>

<script>
    const textInput = document.getElementById('textInput');
    const fileInput = document.getElementById('fileInput');
    const difficultySelect = document.getElementById('difficultySelect');
    const numSelect = document.getElementById('numSelect');
    const startBtn = document.getElementById('startBtn');
    const quizDiv = document.querySelector('.quiz');
    const questionDiv = document.querySelector('.question');
    const optionsDiv = document.querySelector('.options');
    const nextBtn = document.getElementById('nextBtn');
    const resultDiv = document.querySelector('.result');
    const scoreText = document.querySelector('.score');
    const restartBtn = document.getElementById('restartBtn');
    const quizStatus = document.getElementById('quizStatus');
    const feedback = document.getElementById('feedback');

    let questions = [];
    let currentQuestion = 0;
    let score = 0;
    let quizSourceText = '';
    let quizDifficulty = 'simple';

    fileInput.addEventListener('change', (event) => {
        const file = event.target.files[0];
        if (!file) return;
        if (file.name.toLowerCase().endsWith('.txt')) {
            const reader = new FileReader();
            reader.onload = (e) => {
                textInput.value = e.target.result;
            };
            reader.readAsText(file, 'UTF-8');
        } else if (file.name.toLowerCase().endsWith('.pdf')) {
            // Keep file for server upload; optional client preview
            textInput.value = 'PDF file loaded; click Generate Quiz to parse the PDF on server.';
        } else {
            alert('Only .txt or .pdf files are supported for upload.');
            fileInput.value = '';
            return;
        }
    });

    startBtn.addEventListener('click', async () => {
        const text = textInput.value.trim();
        const file = fileInput.files[0];
        if (!text && !file) {
            alert('Please provide text or upload a .txt/.pdf document.');
            return;
        }

        const difficulty = difficultySelect.value;
        const numQuestions = parseInt(numSelect.value, 10);

        quizStatus.textContent = 'Generating quiz (this may take 10-20 seconds)...';
        startBtn.disabled = true;

        try {
            let res;
            if (file && file.name.toLowerCase().endsWith('.pdf')) {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('difficulty', difficulty);
                formData.append('num', numQuestions);
                res = await fetch('/generate_quiz', {
                    method: 'POST',
                    body: formData
                });
            } else {
                res = await fetch('/generate_quiz', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, difficulty, num: numQuestions })
                });
            }
            const data = await res.json();

            if (!data.success) {
                quizStatus.textContent = 'Error: ' + (data.error || 'Could not generate quiz.');
                return;
            }

            questions = data.quiz;
            if (!Array.isArray(questions) || questions.length === 0) {
                quizStatus.textContent = 'No questions were generated. Try a different text.';
                return;
            }

            currentQuestion = 0;
            score = 0;
            quizSourceText = text;
            quizDifficulty = difficulty;
            quizStatus.textContent = '';
            quizDiv.classList.remove('hidden');
            resultDiv.classList.add('hidden');
            feedback.textContent = '';
            showQuestion();

        } catch (error) {
            console.error(error);
            quizStatus.textContent = 'Failed to generate quiz. See dev console.';
        } finally {
            startBtn.disabled = false;
        }
    });

    function showQuestion() {
        const q = questions[currentQuestion];
        questionDiv.textContent = `${currentQuestion + 1}. ${q.question || 'Question text unavailable'}`;
        optionsDiv.innerHTML = '';

        const opts = q.options || [];
        opts.forEach((opt) => {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.textContent = opt;
            btn.className = 'p-3 bg-[var(--primary-soft)] rounded-lg text-[var(--text)] hover:bg-[var(--primary)] hover:text-white transition';
            btn.addEventListener('click', () => checkAnswer(opt, q.answer));
            optionsDiv.appendChild(btn);
        });

        nextBtn.classList.add('hidden');
    }

    function checkAnswer(selected, correct) {
        const normalizedCorrect = (correct || '').trim();
        const normalizedSelected = (selected || '').trim();
        const isRight = normalizedSelected === normalizedCorrect;

        if (isRight) {
            score++;
            quizStatus.textContent = '✅ Correct!';
            feedback.textContent = `Well done! The correct answer is: ${normalizedCorrect}`;
        } else {
            quizStatus.textContent = '❌ Incorrect!';
            feedback.textContent = `The right option is: ${normalizedCorrect}.`;        
        }

        Array.from(optionsDiv.children).forEach((btn) => {
            btn.disabled = true;
            const text = btn.textContent.trim();
            if (text === normalizedCorrect) {
                btn.classList.add('bg-green-500', 'text-white');
            } else if (text === normalizedSelected) {
                btn.classList.add('bg-red-500', 'text-white');
            } else {
                btn.classList.add('opacity-60');
            }
        });

        nextBtn.classList.remove('hidden');

        // auto advance after 1.5 seconds
        setTimeout(() => {
            nextBtn.click();
        }, 1500);
    }

    async function submitQuizResults() {
        try {
            await fetch('/submit_quiz', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    text: quizSourceText,
                    score: score,
                    total: questions.length,
                    difficulty: quizDifficulty,
                    title: `Quiz ${new Date().toLocaleString()}`
                })
            });
        } catch (e) {
            console.error('Submit quiz failed', e);
        }
    }

    nextBtn.addEventListener('click', () => {
        currentQuestion += 1;
        if (currentQuestion < questions.length) {
            showQuestion();
            quizStatus.textContent = '';
            feedback.textContent = '';
        } else {
            quizDiv.classList.add('hidden');
            resultDiv.classList.remove('hidden');
            scoreText.textContent = `You scored ${score} out of ${questions.length}`;
            quizStatus.textContent = '';
            feedback.textContent = '';
            submitQuizResults();
        }
    });

    restartBtn.addEventListener('click', () => {
        resultDiv.classList.add('hidden');
        quizDiv.classList.add('hidden');
        quizStatus.textContent = '';
        textInput.value = '';
        fileInput.value = '';
        score = 0;
        currentQuestion = 0;
    });
</script>
{% endblock %}
