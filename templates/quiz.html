{% extends "base.html" %}
{% block title %}AI Quiz | SunoPadho{% endblock %}
{% block header %}AI Quiz Generator{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto space-y-6">

    <div class="glass-card p-6 rounded-3xl">
        <h3 class="text-lg font-bold mb-4">Programming Languages</h3>
        <select id="prog" multiple class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white" style="min-height:120px;">
            <option>C++</option>
            <option>C</option>
            <option>Java</option>
            <option>Python</option>
            <option>Dart</option>
            <option>HTML</option>
            <option>CSS</option>
            <option>JavaScript</option>
            <option>SQL</option>
        </select>
    </div>

    <div class="glass-card p-6 rounded-3xl">
        <h3 class="text-lg font-bold mb-4">CS Fundamentals</h3>
        <select id="cs" multiple class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white" style="min-height:100px;">
            <option>Computer Networks</option>
            <option>DBMS</option>
            <option>Operating Systems</option>
            <option>CCNA</option>
            <option>Artificial Intelligence</option>
        </select>
    </div>

    <div class="glass-card p-6 rounded-3xl">
        <h3 class="text-lg font-bold mb-4">Other Categories</h3>
        <select id="other" multiple class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white" style="min-height:100px;">
            <option>General Knowledge</option>
            <option>Mathematics</option>
            <option>Logical Reasoning</option>
            <option>Data Structures</option>
            <option>Algorithms</option>
        </select>
    </div>

    <div class="glass-card p-6 rounded-3xl">
        <h3 class="text-lg font-bold mb-4">Quiz Settings</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <select id="difficulty" class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white">
                <option class="bg-gray-900">Easy</option>
                <option class="bg-gray-900">Medium</option>
                <option class="bg-gray-900">Hard</option>
            </select>
            <select id="num" class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white">
                <option value="5" class="bg-gray-900">5 Questions</option>
                <option value="10" class="bg-gray-900">10 Questions</option>
                <option value="15" class="bg-gray-900">15 Questions</option>
            </select>
        </div>
    </div>

    <button id="quizBtn" onclick="generateQuiz()" class="active-nav w-full py-4 rounded-2xl font-bold text-xl transition transform active:scale-95">
        ✨ Generate Quiz
    </button>

    <div class="glass-card p-8 rounded-3xl">
        <h3 class="text-lg font-bold mb-4">📥 Quiz Output</h3>
        <div id="output" class="whitespace-pre-wrap bg-white/5 p-6 rounded-2xl text-sm leading-relaxed min-h-[100px]"></div>
    </div>

</div>

<script>
function getSelectedValues(id) {
    let select = document.getElementById(id);
    return Array.from(select.selectedOptions).map(option => option.value);
}

async function generateQuiz() {
    let categories = [
        ...getSelectedValues("prog"),
        ...getSelectedValues("cs"),
        ...getSelectedValues("other")
    ];

    if (categories.length === 0) {
        if (typeof speak === 'function') speak('Please select at least one category.');
        return;
    }

    let difficulty = document.getElementById("difficulty").value;
    let num = document.getElementById("num").value;

    const btn = document.getElementById('quizBtn');
    btn.innerText = '🧠 Generating...';
    document.getElementById("output").innerText = "AI is generating your quiz...";

    try {
        const res = await fetch('/generate_quiz', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ categories, difficulty, num })
        });
        const data = await res.json();
        document.getElementById("output").innerText = data.quiz;
        btn.innerText = '✨ Generate Quiz';

        if (typeof speak === 'function') speak('Quiz generated successfully!');
    } catch(e) {
        document.getElementById("output").innerText = "Error generating quiz. Please try again.";
        btn.innerText = '✨ Generate Quiz';
    }
}
</script>
{% endblock %}
