<!DOCTYPE html>
<html>
<head>
<title>AI Quiz Generator</title>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial;
    text-align: center;
}

.container {
    width: 600px;
    margin: auto;
    margin-top: 40px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
}

select, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
}

button {
    background: linear-gradient(to right, #3b82f6, #8b5cf6);
    color: white;
    border: none;
    cursor: pointer;
}

#output {
    white-space: pre-wrap;
    text-align: left;
    background: #020617;
    padding: 15px;
    border-radius: 10px;
}
</style>

</head>

<body>

<div class="container">

<h1>🧠 AI Quiz Generator</h1>

<!-- Programming Languages -->
<div class="card">
    <h3>Programming Languages</h3>
    <select id="prog" multiple>
        <option>C++</option>
        <option>C</option>
        <option>Java</option>
        <option>Python</option>
        <option>Dart</option>
        <option>HTML</option>
        <option>CSS</option>
        <option>JavaScript</option>
        <option>SQL</option>
    </select>
</div>

<!-- CS Fundamentals -->
<div class="card">
    <h3>CS Fundamentals</h3>
    <select id="cs" multiple>
        <option>Computer Networks</option>
        <option>DBMS</option>
        <option>Operating Systems</option>
        <option>CCNA</option>
        <option>Artificial Intelligence</option>
    </select>
</div>

<!-- Extra Categories -->
<div class="card">
    <h3>Other Categories</h3>
    <select id="other" multiple>
        <option>General Knowledge</option>
        <option>Mathematics</option>
        <option>Logical Reasoning</option>
        <option>Data Structures</option>
        <option>Algorithms</option>
    </select>
</div>

<!-- Settings -->
<div class="card">
    <h3>Quiz Settings</h3>

    <select id="difficulty">
        <option>Easy</option>
        <option>Medium</option>
        <option>Hard</option>
    </select>

    <select id="num">
        <option value="5">5 Questions</option>
        <option value="10">10 Questions</option>
        <option value="15">15 Questions</option>
    </select>
</div>

<!-- Button -->
<button onclick="generateQuiz()">✨ Generate Quiz</button>

<!-- Output -->
<div class="card">
    <h3>📥 Quiz Output</h3>
    <div id="output"></div>
</div>

</div>

<script>
function getSelectedValues(id) {
    let select = document.getElementById(id);
    return Array.from(select.selectedOptions).map(option => option.value);
}

function generateQuiz() {
    let categories = [
        ...getSelectedValues("prog"),
        ...getSelectedValues("cs"),
        ...getSelectedValues("other")
    ];

    let difficulty = document.getElementById("difficulty").value;
    let num = document.getElementById("num").value;

    fetch('/generate_quiz', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ categories, difficulty, num })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("output").innerText = data.quiz;
    });
}
</script>

</body>
</html>
